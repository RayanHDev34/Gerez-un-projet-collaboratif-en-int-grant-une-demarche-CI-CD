name: CI

on:
  workflow_dispatch:
  push:

jobs:
  front:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: front

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install
        run: npm install

      - name: Test
        run: npm run test -- --watch=false --browsers=ChromeHeadless --code-coverage

      - name: Publish Front Test Report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Front Tests
          path: front/test-results/junit.xml
          reporter: java-junit

      - name: Build
        run: npm run build

  back:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: back

    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 11
      - run: mvn clean verify
      - name: Publish Back Test Report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Back Tests
          path: back/target/surefire-reports/*.xml
          reporter: java-junit

  sonar:
    runs-on: ubuntu-latest
    needs: [front, back]

    defaults:
      run:
        working-directory: back

    steps:
      - uses: actions/checkout@v3

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17

      - name: Build Back (needed for Sonar)
        run: mvn clean verify
        working-directory: back

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        with:
          args: >
            -Dsonar.projectKey=RayanHDev34_Gerez-un-projet-collaboratif-en-int-grant-une-demarche-CI-CD
            -Dsonar.organization=rayanhdev34
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
