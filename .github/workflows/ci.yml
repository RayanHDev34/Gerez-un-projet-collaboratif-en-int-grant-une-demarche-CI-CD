name: CI

on:
  workflow_dispatch:
  push:

jobs:
  front_install:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: front

    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 18
      - run: npm install

  front_test:
    runs-on: ubuntu-latest
    needs: front_install
    defaults:
      run:
        working-directory: front

    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 18
      - run: npm install
      - run: npm run test -- --watch=false --browsers=ChromeHeadless

  front_build:
    runs-on: ubuntu-latest
    needs: front_test
    defaults:
      run:
        working-directory: front

    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 18
      - run: npm install
      - run: npm run build

  back:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: back

    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 11
      - run: mvn clean verify
