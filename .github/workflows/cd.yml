name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  front:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: front

    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 18
      - run: npm install
      - run: npm run test -- --watch=false --browsers=ChromeHeadless --code-coverage
      - uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Front Tests
          path: front/test-results/junit.xml
          reporter: java-junit
      - run: npm run build

  back:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: back

    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 11
      - run: mvn clean verify
      - uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Back Tests
          path: back/target/surefire-reports/*.xml
          reporter: java-junit

  sonar:
    runs-on: ubuntu-latest
    needs: [front, back]

    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 18
      - run: npm install
        working-directory: front
      - run: npm run test -- --watch=false --browsers=ChromeHeadless --code-coverage
        working-directory: front
      - uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17
      - run: mvn clean verify
        working-directory: back
      - uses: SonarSource/sonarcloud-github-action@v2
        with:
          args: >
            -Dsonar.projectKey=RayanHDev34_Gerez-un-projet-collaboratif-en-int-grant-une-demarche-CI-CD
            -Dsonar.organization=rayanhdev34
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
